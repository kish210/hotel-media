server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php;

    charset utf-8;
    client_max_body_size 512M;
    client_body_timeout 300s;
    fastcgi_read_timeout 300;

    # Security headers
    add_header X-Content-Type-Options  "nosniff"   always;
    add_header X-Frame-Options         "SAMEORIGIN" always;
    add_header X-XSS-Protection        "1; mode=block" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml+rss
        image/svg+xml font/woff font/woff2;

    # Static assets
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|mp4|webm|ogg|ogv)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
        access_log off;
    }

    # Uploads — به PHP router بده
    location /uploads/ {
        try_files $uri /index.php?$query_string;
    }

    # All requests go through index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass   php:9000;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param  PHP_VALUE "session.save_path=/var/www/html/storage/sessions";
        include        fastcgi_params;
        fastcgi_read_timeout  300;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # Block sensitive files
    location ~ /\.(ht|git|env) { deny all; return 404; }
    location ~ \.(sql|log|sh|md|json)$ {
        deny all;
        return 404;
    }
    location ~* ^/vendor/ { deny all; return 404; }
    location ~* ^/app/    { deny all; return 404; }
    location ~* ^/config/ { deny all; return 404; }
    location ~* ^/storage/logs/ { deny all; return 404; }

    # Error pages
    error_page 404 /index.php;
    error_page 500 502 503 504 /index.php;
}
