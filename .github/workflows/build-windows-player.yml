name: 🖥️ Build Windows Player (Electron)

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    name: Build Windows EXE Installer
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: windows-player/package.json

      - name: Ensure assets directory exists
        shell: pwsh
        run: |
          $dir = Join-Path $env:GITHUB_WORKSPACE "windows-player\assets"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          Write-Host "Assets dir: $dir"

      - name: Set version
        shell: pwsh
        working-directory: windows-player
        run: |
          $tag = "${{ github.ref_name }}" -replace '^v', ''
          if ($tag -match '^\d+\.\d+\.\d+$') {
            $pkg = Get-Content package.json -Raw | ConvertFrom-Json
            $pkg.version = $tag
            $pkg | ConvertTo-Json -Depth 10 | Set-Content package.json -Encoding utf8
            Write-Host "Version → $tag"
          }

      - name: Install dependencies
        working-directory: windows-player
        run: npm install

      - name: Build EXE
        working-directory: windows-player
        run: npm run build

      - name: Rename installer
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $distDir = Join-Path $env:GITHUB_WORKSPACE "windows-player\dist"
          $exe = Get-ChildItem $distDir -Filter "*.exe" -Recurse | Select-Object -First 1
          if ($exe) {
            $dest = Join-Path $distDir "SignageCMS-$tag-windows-player-setup.exe"
            Rename-Item $exe.FullName $dest
            Write-Host "Renamed → $dest"
          } else {
            Write-Host "No EXE found in $distDir"
            Get-ChildItem $distDir -Recurse | ForEach-Object { Write-Host $_.FullName }
          }

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v7
        with:
          name: SignageCMS-Windows-Player-Installer
          path: |
            windows-player/dist/*.exe
            windows-player/dist/*.msi
          retention-days: 90
