name: 🤖 Build Android APK

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ─────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── JDK ──────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── Gradle permission ────────────────────────────────────
      - name: Grant execute permission to gradlew
        working-directory: android
        run: chmod +x gradlew

      # ── Build Debug APK (همیشه) ──────────────────────────────
      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      # ── Build Release APK (فقط روی tag) ─────────────────────
      - name: Build Release APK
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: android
        env:
          KEYSTORE_BASE64:  ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS:        ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:     ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD:   ${{ secrets.STORE_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > app/signage.keystore
            ./gradlew assembleRelease --no-daemon \
              -Pandroid.injected.signing.store.file=$(pwd)/app/signage.keystore \
              -Pandroid.injected.signing.store.password=$STORE_PASSWORD \
              -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
              -Pandroid.injected.signing.key.password=$KEY_PASSWORD
          else
            echo "⚠ No keystore secrets found — building unsigned release"
            ./gradlew assembleRelease --no-daemon
          fi

      # ── آپلود Debug APK ──────────────────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: SignageCMS-Debug-APK
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      # ── آپلود Release APK ────────────────────────────────────
      - name: Upload Release APK
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: SignageCMS-Release-APK
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 90

      # ── نمایش اطلاعات APK ───────────────────────────────────
      - name: APK info
        run: |
          echo "=== Debug APK ==="
          find android/app/build/outputs/apk/debug -name "*.apk" -exec ls -lh {} \;
          if [ -d android/app/build/outputs/apk/release ]; then
            echo "=== Release APK ==="
            find android/app/build/outputs/apk/release -name "*.apk" -exec ls -lh {} \;
          fi
