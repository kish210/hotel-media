name: 🤖 Build Android APK

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission to gradlew
        working-directory: android
        run: chmod +x gradlew

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Build Release APK
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: android
        env:
          KEYSTORE_BASE64:  ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS:        ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:     ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD:   ${{ secrets.STORE_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > app/signage.keystore
            ./gradlew assembleRelease --no-daemon \
              -Pandroid.injected.signing.store.file=$(pwd)/app/signage.keystore \
              -Pandroid.injected.signing.store.password=$STORE_PASSWORD \
              -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
              -Pandroid.injected.signing.key.password=$KEY_PASSWORD
          else
            echo "⚠ No keystore secrets — building unsigned release"
            ./gradlew assembleRelease --no-daemon
          fi

      - name: Upload Debug APK
        uses: actions/upload-artifact@v7
        with:
          name: SignageCMS-Debug-APK
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Release APK
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v7
        with:
          name: SignageCMS-Release-APK
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: APK info
        run: |
          echo "=== Debug APK ==="
          find android/app/build/outputs/apk/debug -name "*.apk" -exec ls -lh {} \;
          if [ -d android/app/build/outputs/apk/release ]; then
            echo "=== Release APK ==="
            find android/app/build/outputs/apk/release -name "*.apk" -exec ls -lh {} \;
          fi
