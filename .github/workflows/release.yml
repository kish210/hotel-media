name: 🚀 Create GitHub Release

on:
  push:
    tags: ['v*']

jobs:
  # ── ساخت Android APK ────────────────────────────────────────
  android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Download Gradle Wrapper JAR
        working-directory: android/gradle/wrapper
        run: |
          curl -fsSL -o gradle-wrapper.jar \
            "https://github.com/gradle/gradle/raw/v8.0.0/gradle/wrapper/gradle-wrapper.jar"
          ls -lh gradle-wrapper.jar

      - name: Grant gradlew permission
        working-directory: android
        run: chmod +x gradlew

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Build Release APK + AAB (if keystore exists)
        working-directory: android
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS:       ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:    ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD:  ${{ secrets.STORE_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > app/signage.keystore
            # APK — برای دانلود مستقیم و نصب روی دستگاه‌ها
            ./gradlew assembleRelease --no-daemon \
              -Pandroid.injected.signing.store.file=$(pwd)/app/signage.keystore \
              -Pandroid.injected.signing.store.password=$STORE_PASSWORD \
              -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
              -Pandroid.injected.signing.key.password=$KEY_PASSWORD
            # AAB — برای Google Play Store
            ./gradlew bundleRelease --no-daemon \
              -Pandroid.injected.signing.store.file=$(pwd)/app/signage.keystore \
              -Pandroid.injected.signing.store.password=$STORE_PASSWORD \
              -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
              -Pandroid.injected.signing.key.password=$KEY_PASSWORD
            echo "SIGNED=true" >> $GITHUB_ENV
          else
            echo "⚠ No keystore — building unsigned debug APK only"
            echo "SIGNED=false" >> $GITHUB_ENV
          fi

      - name: Collect APK + AAB
        run: |
          TAG=${{ github.ref_name }}
          mkdir -p dist
          # APK — versioned + stable name (for /releases/latest/download/)
          if ls android/app/build/outputs/apk/release/*.apk 2>/dev/null; then
            cp android/app/build/outputs/apk/release/*.apk dist/SignageCMS-${TAG}-android.apk
          else
            cp android/app/build/outputs/apk/debug/*.apk   dist/SignageCMS-${TAG}-android.apk
          fi
          cp dist/SignageCMS-${TAG}-android.apk dist/SignageCMS-android.apk
          # AAB (Google Play Store)
          if ls android/app/build/outputs/bundle/release/*.aab 2>/dev/null; then
            cp android/app/build/outputs/bundle/release/*.aab \
               dist/SignageCMS-${TAG}-android-playstore.aab
          fi
          ls -lh dist/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-apk
          path: dist/SignageCMS-*.apk

      - name: Upload AAB artifact (Play Store)
        uses: actions/upload-artifact@v7
        with:
          name: android-aab
          path: dist/SignageCMS-*-playstore.aab
          if-no-files-found: ignore

  # ── ساخت Windows Player (Electron) ───────────────────────────
  windows-player:
    name: Build Windows Player EXE
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: windows-player/package.json

      - name: Ensure assets directory exists
        shell: pwsh
        run: |
          $dir = Join-Path $env:GITHUB_WORKSPACE "windows-player\assets"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          Write-Host "Assets dir: $dir"

      - name: Set version in package.json
        shell: pwsh
        working-directory: windows-player
        run: |
          $tag = "${{ github.ref_name }}" -replace '^v', ''
          if ($tag -match '^\d+\.\d+\.\d+$') {
            $pkg = Get-Content package.json -Raw | ConvertFrom-Json
            $pkg.version = $tag
            $pkg | ConvertTo-Json -Depth 10 | Set-Content package.json -Encoding utf8
            Write-Host "Version set to $tag"
          }

      - name: Install dependencies
        working-directory: windows-player
        run: npm install

      - name: Build EXE
        working-directory: windows-player
        run: npm run build

      - name: List dist contents
        shell: pwsh
        run: |
          $distDir = Join-Path $env:GITHUB_WORKSPACE "windows-player\dist"
          Get-ChildItem $distDir -Recurse | ForEach-Object { Write-Host $_.FullName }

      - name: Rename installer (versioned + stable)
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $distDir = Join-Path $env:GITHUB_WORKSPACE "windows-player\dist"
          $exe = Get-ChildItem $distDir -Filter "*.exe" -Recurse | Select-Object -First 1
          if ($exe) {
            $versioned = Join-Path $distDir "SignageCMS-$tag-windows-player-setup.exe"
            $stable    = Join-Path $distDir "SignageCMS-windows-player-setup.exe"
            Rename-Item $exe.FullName $versioned
            Copy-Item $versioned $stable
            Write-Host "Versioned: $versioned"
            Write-Host "Stable:    $stable"
          } else {
            Write-Error "No EXE found in $distDir"
            exit 1
          }

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-player-exe
          path: windows-player/dist/SignageCMS-*.exe

  # ── ساخت Windows Server ZIP ──────────────────────────────────
  windows-server:
    name: Build Windows Server ZIP
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set version output
        id: ver
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}" -replace '^v', ''
          Write-Host "VERSION=$v"
          echo "VERSION=$v" >> $env:GITHUB_OUTPUT

      - name: Build ZIP
        shell: pwsh
        run: |
          $outDir = Join-Path $env:GITHUB_WORKSPACE "dist"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null
          .\scripts\build-release.ps1 -Version "${{ steps.ver.outputs.VERSION }}" -Output $outDir
          Write-Host "=== dist contents ==="
          Get-ChildItem $outDir | ForEach-Object { Write-Host $_.FullName }

      - name: Rename ZIP (versioned + stable)
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $outDir = Join-Path $env:GITHUB_WORKSPACE "dist"
          $src = Get-ChildItem $outDir -Filter "SignageCMS-v*.zip" | Select-Object -First 1
          if ($src) {
            $versioned = Join-Path $outDir "SignageCMS-$tag-server.zip"
            $stable    = Join-Path $outDir "SignageCMS-server.zip"
            Rename-Item $src.FullName $versioned
            Copy-Item $versioned $stable
            Write-Host "Versioned: $versioned"
            Write-Host "Stable:    $stable"
          } else {
            Write-Error "No server ZIP found in $outDir"
            Get-ChildItem $outDir | ForEach-Object { Write-Host $_.FullName }
            exit 1
          }

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-server-zip
          # match BOTH versioned (…-v1.6.2-server.zip) and stable (…-server.zip)
          path: dist/SignageCMS-*server.zip

  # ── ساخت Windows Server Installer (Inno Setup / ISCC) ────────
  windows-installer:
    name: Build Windows Server Installer (ISCC)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set version output
        id: ver
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}" -replace '^v', ''
          Write-Host "VERSION=$v"
          echo "VERSION=$v" >> $env:GITHUB_OUTPUT

      - name: Build clean server payload
        shell: pwsh
        run: |
          $ver = "${{ steps.ver.outputs.VERSION }}"
          $dist = Join-Path $env:GITHUB_WORKSPACE "dist"
          New-Item -ItemType Directory -Force -Path $dist | Out-Null
          # تولید بسته تمیز سرور (بدون .git / vendor / .env)
          .\scripts\build-release.ps1 -Version $ver -Output $dist
          $zip = Get-ChildItem $dist -Filter "SignageCMS-v*.zip" | Select-Object -First 1
          if (-not $zip) { Write-Error "Server ZIP not found"; exit 1 }
          $payload = Join-Path $dist "server-files"
          Expand-Archive -Path $zip.FullName -DestinationPath $payload -Force
          Write-Host "Payload: $payload"
          Get-ChildItem $payload | Select-Object Name | Format-Table

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Compile installer with ISCC
        shell: pwsh
        run: |
          $ver = "${{ steps.ver.outputs.VERSION }}"
          $src = Join-Path $env:GITHUB_WORKSPACE "dist\server-files"
          $iss = Join-Path $env:GITHUB_WORKSPACE "installer\SignageCMS.iss"
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { $iscc = "$env:ProgramFiles\Inno Setup 6\ISCC.exe" }
          Write-Host "ISCC: $iscc"
          & $iscc "/DMyAppVersion=$ver" "/DSourceDir=$src" $iss
          if ($LASTEXITCODE -ne 0) { Write-Error "ISCC failed"; exit 1 }

      - name: Rename installer (versioned + stable)
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $outDir = Join-Path $env:GITHUB_WORKSPACE "installer\Output"
          $exe = Get-ChildItem $outDir -Filter "*.exe" | Select-Object -First 1
          if (-not $exe) { Write-Error "No installer EXE produced"; Get-ChildItem $outDir; exit 1 }
          $dist = Join-Path $env:GITHUB_WORKSPACE "dist"
          New-Item -ItemType Directory -Force -Path $dist | Out-Null
          $versioned = Join-Path $dist "SignageCMS-$tag-server-setup.exe"
          $stable    = Join-Path $dist "SignageCMS-server-setup.exe"
          Copy-Item $exe.FullName $versioned -Force
          Copy-Item $exe.FullName $stable -Force
          Write-Host "Versioned: $versioned"
          Write-Host "Stable:    $stable"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-server-installer
          # match BOTH versioned (…-v1.6.2-server-setup.exe) and stable (…-server-setup.exe)
          path: dist/SignageCMS-*server-setup.exe

  # ── ساخت GitHub Release ───────────────────────────────────────
  create-release:
    name: Create GitHub Release
    needs: [android, windows-player, windows-server, windows-installer]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-files
          merge-multiple: true

      - name: List release files
        run: |
          echo "=== Release files ==="
          find release-files -type f -exec ls -lh {} \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "SignageCMS ${{ github.ref_name }}"
          body: |
            ## SignageCMS ${{ github.ref_name }}

            ### ✨ قابلیت‌های جدید (v1.6.0)

            #### 💬 سیستم پیام‌های زمان‌بندی‌شده
            - ارسال پیام‌های خوشامد، تبریک و اعلان با زمان‌بندی دقیق روی شاشه‌ها
            - انواع نمایش: Overlay، Fullscreen، Popup، Banner
            - هدف‌گذاری: همه شاشه‌ها / شاشه خاص / گروه
            - تکرار: یک‌بار، روزانه، هفتگی، ماهانه
            - محتوای سه‌زبانه (فارسی / انگلیسی / عربی) روی هر پیام

            #### 🌐 رابط کاربری چندزبانه (fa / en / ar)
            - سوئیچ زبان از topbar در یک کلیک
            - پشتیبانی کامل RTL (فارسی/عربی) و LTR (انگلیسی)
            - تغییر خودکار فونت: Vazirmatn / Inter / Tajawal
            - تمام متن‌های رابط ترجمه‌شده در سه زبان

            #### ⬡ نوع شاشه Monitor 3D
            - پشتیبانی از مانیتورهای هولوگرافیک و glasses-free 3D تبلیغاتی
            - فرمت‌ها: Normal+Depth، Hologram LED، SBS، Anaglyphic، Top-Bottom
            - جلوه‌های بصری: parallax، scan-line، glow، depth badge
            - تنظیمات اختصاصی در پنل مدیریت + پیش‌نمایش مستقیم

            #### 📺 یکپارچه‌سازی TVHeadend
            - مدیریت کانال‌های Live TV از طریق TVHeadend
            - مستندات راهنما (Help) داخل پنل

            ---

            ### 📥 دانلود

            | فایل | توضیح | سیستم‌عامل |
            |------|-------|------------|
            | `*-android.apk` | اپلیکیشن Android / Android TV — نصب مستقیم | Android 5.0+ |
            | `*-android-playstore.aab` | Android App Bundle — آپلود در Google Play Store | Google Play |
            | `*-windows-player-setup.exe` | پلیر Windows (نصب‌کننده) | Windows 10/11 |
            | `*-server-setup.exe` | **سرور SignageCMS — نصب‌کننده ویندوز (Inno Setup)** | Windows 10/11 / Server |
            | `*-server.zip` | سرور SignageCMS (Docker) | Windows / Linux |

            ### 🖥️ نصب Windows Player
            1. فایل `*-windows-player-setup.exe` را دانلود کنید
            2. اجرا کنید — نصب خودکار است
            3. آدرس سرور را وارد کنید و متصل شوید

            ### 🐳 نصب سرور
            **ساده‌ترین راه روی ویندوز:** فایل `*-server-setup.exe` را دانلود و اجرا کنید —
            نصب‌کننده همه فایل‌ها را کپی می‌کند و در صورت تمایل، Docker/WSL2 را خودکار نصب و استک را بالا می‌آورد.

            ```bash
            # Linux
            unzip SignageCMS-*-server.zip && bash setup.sh

            # Windows (ZIP) — extract و روی INSTALL.bat دابل‌کلیک کنید
            ```

            ### 🔑 ورود پیش‌فرض
            - URL: `http://your-server/admin`
            - Email: `admin@signagecms.com`
            - Password: `Admin@123456`
          files: release-files/*
          fail_on_unmatched_files: false
          draft: false
          prerelease: false
