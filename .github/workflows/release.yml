name: 🚀 Create GitHub Release

on:
  push:
    tags: ['v*']

jobs:
  # ── ساخت Android APK ────────────────────────────────────────
  android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Download Gradle Wrapper JAR
        working-directory: android/gradle/wrapper
        run: |
          curl -fsSL -o gradle-wrapper.jar \
            "https://github.com/gradle/gradle/raw/v8.0.0/gradle/wrapper/gradle-wrapper.jar"

      - name: Grant gradlew permission
        working-directory: android
        run: chmod +x gradlew

      - name: Build Release APK
        working-directory: android
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS:       ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:    ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD:  ${{ secrets.STORE_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > app/signage.keystore
            ./gradlew assembleRelease --no-daemon \
              -Pandroid.injected.signing.store.file=$(pwd)/app/signage.keystore \
              -Pandroid.injected.signing.store.password=$STORE_PASSWORD \
              -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
              -Pandroid.injected.signing.key.password=$KEY_PASSWORD
          else
            ./gradlew assembleRelease --no-daemon
          fi

      - name: Rename APK
        run: |
          TAG=${{ github.ref_name }}
          mkdir -p dist
          find android/app/build/outputs/apk/release -name "*.apk" \
            -exec cp {} dist/SignageCMS-${TAG}-android.apk \;

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-apk
          path: dist/*.apk

  # ── ساخت Windows Player (Electron) ───────────────────────────
  windows-player:
    name: Build Windows Player EXE
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: windows-player/package.json

      - name: Ensure assets directory exists
        shell: pwsh
        run: |
          $dir = Join-Path $env:GITHUB_WORKSPACE "windows-player\assets"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          Write-Host "Assets dir: $dir"

      - name: Set version
        shell: pwsh
        working-directory: windows-player
        run: |
          $tag = "${{ github.ref_name }}" -replace '^v', ''
          if ($tag -match '^\d+\.\d+\.\d+$') {
            $pkg = Get-Content package.json -Raw | ConvertFrom-Json
            $pkg.version = $tag
            $pkg | ConvertTo-Json -Depth 10 | Set-Content package.json -Encoding utf8
          }

      - name: Install dependencies
        working-directory: windows-player
        run: npm install

      - name: Build EXE
        working-directory: windows-player
        run: npm run build

      - name: Rename installer
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $distDir = Join-Path $env:GITHUB_WORKSPACE "windows-player\dist"
          $exe = Get-ChildItem $distDir -Filter "*.exe" -Recurse | Select-Object -First 1
          if ($exe) {
            $dest = Join-Path $distDir "SignageCMS-$tag-windows-player-setup.exe"
            Rename-Item $exe.FullName $dest
          }

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-player-exe
          path: windows-player/dist/*.exe

  # ── ساخت Windows Server ZIP ──────────────────────────────────
  windows-server:
    name: Build Windows Server ZIP
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set version
        id: ver
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}" -replace '^v', ''
          echo "VERSION=$v" >> $env:GITHUB_OUTPUT

      - name: Build ZIP
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          .\scripts\build-release.ps1 -Version "${{ steps.ver.outputs.VERSION }}" -Output "$env:GITHUB_WORKSPACE\dist"

      - name: Rename ZIP
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $src = Get-ChildItem "dist\SignageCMS-v*.zip" | Select-Object -First 1
          if ($src) { Rename-Item $src.FullName "dist\SignageCMS-$tag-server.zip" }

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-server-zip
          path: dist/*.zip

  # ── ساخت GitHub Release ───────────────────────────────────────
  create-release:
    name: Create GitHub Release
    needs: [android, windows-player, windows-server]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-files

      - name: List release files
        run: find release-files -type f -exec ls -lh {} \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "SignageCMS ${{ github.ref_name }}"
          body: |
            ## SignageCMS ${{ github.ref_name }}

            ### 📥 دانلود

            | فایل | توضیح | سیستم‌عامل |
            |------|-------|------------|
            | `*-android.apk` | اپلیکیشن Android / Android TV | Android 7+ |
            | `*-windows-player-setup.exe` | پلیر Windows (نصب‌کننده) | Windows 10/11 |
            | `*-server.zip` | سرور SignageCMS (Docker) | Windows / Linux |

            ### 🖥️ نصب Windows Player
            1. فایل `*-windows-player-setup.exe` را دانلود کنید
            2. اجرا کنید — نصب خودکار است
            3. آدرس سرور را وارد کنید و متصل شوید

            ### 🐳 نصب سرور
            ```bash
            # Linux
            unzip SignageCMS-*-server.zip && bash setup.sh

            # Windows — فایل ZIP را extract و setup.bat را اجرا کنید
            ```

            ### 🔑 ورود پیش‌فرض
            - URL: `http://your-server/admin`
            - Email: `admin@signagecms.com`
            - Password: `Admin@123456`
          files: |
            release-files/android-apk/*.apk
            release-files/windows-player-exe/*.exe
            release-files/windows-server-zip/*.zip
          draft: false
          prerelease: false
