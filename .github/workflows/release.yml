name: 🚀 Create GitHub Release

on:
  push:
    tags: ['v*']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── ساخت Android APK ────────────────────────────────────────
  android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant gradlew permission
        working-directory: android
        run: chmod +x gradlew

      - name: Build Release APK
        working-directory: android
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS:       ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:    ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD:  ${{ secrets.STORE_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > app/signage.keystore
            ./gradlew assembleRelease --no-daemon \
              -Pandroid.injected.signing.store.file=$(pwd)/app/signage.keystore \
              -Pandroid.injected.signing.store.password=$STORE_PASSWORD \
              -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
              -Pandroid.injected.signing.key.password=$KEY_PASSWORD
          else
            ./gradlew assembleRelease --no-daemon
          fi

      - name: Rename APK
        run: |
          TAG=${{ github.ref_name }}
          mkdir -p dist
          find android/app/build/outputs/apk/release -name "*.apk" \
            -exec cp {} dist/SignageCMS-${TAG}-android.apk \;

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: dist/*.apk

  # ── ساخت Windows ZIP ─────────────────────────────────────────
  windows:
    name: Build Windows ZIP
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        id: ver
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}" -replace '^v', ''
          echo "VERSION=$v" >> $env:GITHUB_OUTPUT

      - name: Build ZIP
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          .\scripts\build-release.ps1 -Version "${{ steps.ver.outputs.VERSION }}" -Output "$env:GITHUB_WORKSPACE\dist"

      - name: Rename ZIP
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $src = Get-ChildItem "dist\SignageCMS-v*.zip" | Select-Object -First 1
          Rename-Item $src.FullName "SignageCMS-$tag-windows.zip"

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: dist/*.zip

  # ── ساخت GitHub Release ───────────────────────────────────────
  create-release:
    name: Create GitHub Release
    needs: [android, windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-files

      - name: List files
        run: find release-files -type f -exec ls -lh {} \;

      - name: Extract changelog
        id: changelog
        run: |
          TAG=${{ github.ref_name }}
          # خواندن changelog از README
          NOTES=$(sed -n "/### ${TAG}/,/### v/p" README.md | head -20 | grep -v "^### v" || echo "SignageCMS ${TAG}")
          echo "NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "SignageCMS ${{ github.ref_name }}"
          body: |
            ## SignageCMS ${{ github.ref_name }}

            ### دانلود
            | فایل | توضیح |
            |------|-------|
            | `*-android.apk` | اپلیکیشن Android TV |
            | `*-windows.zip` | بسته نصب Windows/Linux (Docker) |

            ### نصب
            ```bash
            # Windows
            # فایل ZIP را extract کنید و setup.bat را اجرا کنید

            # Linux
            unzip SignageCMS-*.zip && bash setup.sh
            ```

            ### ورود پیش‌فرض
            - URL: `http://your-server/admin`
            - Email: `admin@signagecms.com`
            - Password: `Admin@123456`
          files: |
            release-files/android-apk/*.apk
            release-files/windows-zip/*.zip
          draft: false
          prerelease: false
