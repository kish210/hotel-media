name: 📦 Build Windows Release ZIP

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.5.0)'
        required: true
        default: '1.5.0'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-zip:
    name: Build Windows Package
    runs-on: windows-latest

    steps:
      # ── Checkout ─────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── تعیین ورژن ───────────────────────────────────────────
      - name: Set version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $v = "${{ github.event.inputs.version }}"
          } else {
            $v = "${{ github.ref_name }}" -replace '^v', ''
          }
          echo "VERSION=$v" >> $env:GITHUB_OUTPUT
          echo "Version: $v"

      # ── Build Release ZIP ────────────────────────────────────
      - name: Build Release ZIP
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          .\scripts\build-release.ps1 -Version $version -Output "$env:GITHUB_WORKSPACE\dist"

      # ── آپلود ZIP ────────────────────────────────────────────
      - name: Upload Windows ZIP
        uses: actions/upload-artifact@v4
        with:
          name: SignageCMS-Windows-v${{ steps.version.outputs.VERSION }}
          path: dist/SignageCMS-v*.zip
          retention-days: 90

      # ── نمایش اطلاعات ────────────────────────────────────────
      - name: Package info
        shell: pwsh
        run: |
          Get-ChildItem "dist\*.zip" | ForEach-Object {
            $mb = [math]::Round($_.Length / 1MB, 2)
            Write-Host "📦 $($_.Name)  —  $mb MB"
          }
