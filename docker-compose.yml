
services:

  # ─── Nginx Web Server ────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: signage_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - .:/var/www/html:ro
      - ./public/uploads:/var/www/html/public/uploads:ro  # ← فایل‌های آپلودشده
      - ./storage/logs:/var/log/nginx
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - signage_net
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }

  # ─── PHP-FPM ─────────────────────────────────────────────
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: signage_php
    restart: unless-stopped
    volumes:
      - .:/var/www/html
      - sessions_data:/var/www/html/storage/sessions  # ← sessions در volume دائمی
      - ./storage/logs:/var/www/html/storage/logs
      - ./storage/cache:/var/www/html/storage/cache
      - ./public/uploads:/var/www/html/public/uploads  # ← bind mount تا nginx هم ببینه
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-http://localhost}
      APP_KEY: ${APP_KEY:-base64:changethis32charkey00000000000000}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-signage_cms}
      DB_USERNAME: ${DB_USERNAME:-signage_user}
      DB_PASSWORD: ${DB_PASSWORD:-StrongPassword123!}
      JWT_SECRET: ${JWT_SECRET:-change-this-jwt-secret-min-32-chars-00}
      JWT_EXPIRY: ${JWT_EXPIRY:-86400}
      WS_PORT: ${WS_PORT:-8080}
      SESSION_LIFETIME: ${SESSION_LIFETIME:-7200}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - signage_net
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }

  # ─── WebSocket Server ─────────────────────────────────────
  websocket:
    image: php:8.2-cli          # سبک‌تر — composer نیاز نداره
    container_name: signage_ws
    restart: unless-stopped
    command: php /var/www/html/websocket/server.php
    ports:
      - "${WS_PORT:-8080}:8080"
    volumes:
      - .:/var/www/html
    environment:
      WS_HOST: 0.0.0.0
      WS_PORT: ${WS_PORT:-8080}
    networks:
      - signage_net

  # ─── MySQL 8 ─────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: signage_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-signage_cms}
      MYSQL_USER: ${DB_USERNAME:-signage_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-StrongPassword123!}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-RootPass123!}
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
      - ./database/migrations/001_complete_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./database/seeds/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --sql_mode=STRICT_TRANS_TABLES,NO_ZERO_DATE,NO_ZERO_IN_DATE,ERROR_FOR_DIVISION_BY_ZERO,NO_ENGINE_SUBSTITUTION
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-RootPass123!}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - signage_net
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }

  # ─── Redis (Cache & Queue) ────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: signage_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - signage_net

  # ─── phpMyAdmin ───────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:5.2
    container_name: signage_pma
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD:-RootPass123!}
      UPLOAD_LIMIT: 512M
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - signage_net

# ─── Volumes ─────────────────────────────────────────────────
volumes:
  mysql_data:    { driver: local }
  redis_data:    { driver: local }
  sessions_data: { driver: local }   # ← session ها ریست نمی‌شن

# ─── Network ─────────────────────────────────────────────────
networks:
  signage_net:
    driver: bridge
